apiVersion: 1

datasources:
  # ─── Local — Prometheus rodando no compose ──────────────────────────────
  - name: Prometheus-Local
    uid: prom-local
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  # ─── Cloud — placeholder; configurar via env ou via UI ──────────────────
  # Para apontar para uma instância real (ex.: Grafana Cloud, AMP, Chronosphere):
  #   export GRAFANA_CLOUD_PROMETHEUS_URL=https://prometheus-prod-X.grafana.net/api/prom
  # e (se aplicável) descomentar o bloco basicAuth.
  - name: Prometheus-Cloud
    uid: prom-cloud
    type: prometheus
    access: proxy
    url: ${GRAFANA_CLOUD_PROMETHEUS_URL}
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 30s
      httpMethod: POST
    # basicAuth: true
    # basicAuthUser: ${GRAFANA_CLOUD_PROMETHEUS_USER}
    # secureJsonData:
    #   basicAuthPassword: ${GRAFANA_CLOUD_PROMETHEUS_PASSWORD}
