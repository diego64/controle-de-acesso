apiVersion: 1

datasources:
  # ─── Local — Prometheus rodando no compose ──────────────────────────────
  - name: Prometheus-Local
    uid: prom-local
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  # ─── Cloud — mesmo Prometheus local, mas para os dashboards cloud/ ──────
  # Mantemos um datasource separado (com timeInterval maior, alinhado ao
  # scrape_interval 30s do job controle-de-acesso-prod) para que os
  # dashboards da pasta cloud/ tenham configuração visual distinta.
  # Os dados de produção vivem no mesmo Prometheus local — separação
  # acontece via label `job` nas queries (`job="controle-de-acesso-prod"`).
  - name: Prometheus-Cloud
    uid: prom-cloud
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 30s
      httpMethod: POST
