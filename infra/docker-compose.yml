services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: ca-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/controle-de-acesso?authSource=admin
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET é obrigatório}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      HASH_ITERATIONS: ${HASH_ITERATIONS:-100000}
      HASH_KEYLEN: ${HASH_KEYLEN:-64}
      HASH_DIGEST: ${HASH_DIGEST:-sha512}
      CORS_ORIGIN: ${CORS_ORIGIN:-}

  mongodb:
    image: mongo:7
    container_name: ca-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME é obrigatório}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD é obrigatório}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --quiet
          -u "$$MONGO_INITDB_ROOT_USERNAME"
          -p "$$MONGO_INITDB_ROOT_PASSWORD"
          --authenticationDatabase admin
          --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ca-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD é obrigatório}
    volumes:
      - redis_data:/data
    command:
      - sh
      - -c
      - 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    healthcheck:
      test:
        - CMD-SHELL
        - 'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG'
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: ca-mongodb-exporter
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "9216:9216"
    command:
      - "--mongodb.uri=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/admin"
      - "--compatible-mode"
      - "--collect-all"
      - "--web.listen-address=:9216"

  prometheus:
    image: prom/prometheus:latest
    container_name: ca-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: ca-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER é obrigatório}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD é obrigatório}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-http://localhost:9999/alerts}
      # Permite ${VAR:default} nos YAML de provisioning
      GF_DEFAULT_INSTANCE_NAME: ca-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:
