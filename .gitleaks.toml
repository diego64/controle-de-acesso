# Gitleaks — detecção de secrets no repositório
# Documentação: https://github.com/gitleaks/gitleaks

title = "controle-de-acesso gitleaks config"

[extend]
useDefault = true

# ─── REGRAS CUSTOMIZADAS ──────────────────────────────────────────────────

[[rules]]
id = "jwt-secret-env"
description = "JWT_SECRET hardcoded"
regex = '''JWT_SECRET\s*=\s*['"]?[A-Za-z0-9+/=_\-]{8,}['"]?'''
tags = ["secret", "jwt"]

[[rules]]
id = "mongodb-uri-with-credentials"
description = "MongoDB URI com credenciais"
regex = '''mongodb(\+srv)?://[^:]+:[^@]+@'''
tags = ["secret", "database"]

# ─── ALLOWLIST GLOBAL ─────────────────────────────────────────────────────

[allowlist]
description = "Arquivos que podem conter valores de exemplo"
paths = [
  ".env.example",
  "CLAUDE.md",
  "docs/",
  ".claude/",
  "README.md"
]
regexTarget = "line"
regexes = [
  # Valores placeholder explícitos
  '''mude-isso-em-producao''',
  '''sua-uri-aqui''',
  '''example\.com''',
  # Valores de teste no CI (identificáveis)
  '''ci-test-secret''',
]
